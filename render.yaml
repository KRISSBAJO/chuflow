services:
  - type: web
    name: churchflow-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: APP_NAME
        value: ChuFlow
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: WEB_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AUTH_COOKIE_NAME
        value: cms_access_token
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAME_SITE
        value: lax
      - key: COOKIE_DOMAIN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_SECURE
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
